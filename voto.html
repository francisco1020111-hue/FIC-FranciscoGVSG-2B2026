<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>Eleições</h1>
    <br>

    <h2 id="tituloeleitor">Eleitor</h2>
    <h2>Insira sua idade:</h2>

    <select id="opcao">

        <option value="1">-16</option>
        <option value="2">16 ~ 18</option>
        <option value="3">18 ~ 70</option>
        <br>
    </select>

    <button onclick="MinhaIdade()">
        Inserir
    </button>

    <p id="resultadoidade"></p>

    <br>

    <h2>Vote no seu candidato:</h2>

    <select id="voto">

        <option value="4">17</option>
        <option value="5">80</option>
        <option value="6">46</option>

    </select>

    <button onclick="MeuVoto()">
        Votar
    </button>

    <p id="resultadovoto"></p>

    <script src="voto.js"></script>

</body>

</html>
